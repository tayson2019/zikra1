<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="إرسال طلب إضافة صفحة ذكرى لمراجعته قبل النشر"><title>طلب إضافة ذكرى</title><meta name="theme-color" content="#090c12"><link rel="icon" href="assets/icon.svg"><link rel="stylesheet" href="assets/styles.css?v=14.3"></head><body>
<div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>
<header class="topbar"><div class="container nav"><a class="brand" href="/"><span class="brand-mark">ذ</span><span class="brand-copy"><span>ذِكرى</span><small class="brand-tagline">دعاءٌ يبقى</small></span></a><div class="nav-actions"><a class="btn btn-soft" href="/">الرئيسية</a><a class="btn btn-soft" href="admin.html">لوحة الإدارة</a></div></div></header>
<main class="section request-page"><div class="container request-container"><section class="panel request-intro"><span class="eyebrow">مشاركة من الزوار</span><h1>أضف ذكرى لمن تحب</h1><p class="muted">أرسل البيانات، وستصل إلى لوحة الإدارة للمراجعة. لن تظهر الصفحة للعامة إلا بعد موافقة المدير.</p><div class="request-steps"><span><b>١</b> أدخل البيانات</span><span><b>٢</b> مراجعة الإدارة</span><span><b>٣</b> نشر صفحة الذكرى</span></div></section>
<section class="panel"><div id="requestStatus" class="status"></div><form id="requestForm" class="form-grid">
<div class="field"><label>اسم مقدم الطلب *</label><input id="requesterName" maxlength="100" required autocomplete="name"></div>
<div class="field"><label>وسيلة التواصل *</label><input id="requesterContact" maxlength="160" required placeholder="رقم هاتف أو بريد إلكتروني"></div>
<div class="field full"><label>اسم المتوفى كاملًا *</label><input id="fullName" maxlength="180" required></div>
<div class="field"><label>تاريخ الميلاد</label><input id="birthDate" type="date"></div><div class="field"><label>تاريخ الوفاة</label><input id="deathDate" type="date"></div>
<div class="field full"><label>الصورة الرئيسية *</label><input id="photoFile" type="file" accept="image/jpeg,image/png,image/webp" required><small class="muted">JPG أو PNG أو WebP، والحد الأقصى 5 ميجابايت.</small></div>
<div class="field full"><label>وصف مختصر</label><input id="shortDescription" maxlength="250" placeholder="مثال: كان محبًا للخير وذا سيرة طيبة"></div>
<div class="field full"><label>نبذة أو سيرة</label><textarea id="biography" maxlength="3000" placeholder="اكتب كلمات تليق بذكراه..."></textarea></div>
<div class="field full"><label>دعاء مقترح</label><textarea id="prayerText" maxlength="600">اللهم اغفر له وارحمه، وعافه واعف عنه، وأكرم نزله، ووسع مدخله.</textarea></div>
<div class="field full request-consent"><label><input id="consent" type="checkbox" required> أؤكد أن لدي الحق في إرسال هذه البيانات والصورة، وأوافق على مراجعتها ونشرها في الموقع بعد الموافقة.</label></div>
<input id="website" class="hp-field" tabindex="-1" autocomplete="off">
<div class="field full"><button id="submitRequest" class="btn btn-primary request-submit" type="submit">إرسال الطلب للمراجعة</button></div>
</form></section></div></main>
<footer class="footer"><div class="container"><div class="footer-mark">ذِكرى</div><div>رحمةٌ تُهدى ودعاءٌ لا ينقطع</div></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2'"></script><script src="assets/config.js?v=14.3"></script><script src="assets/app.js?v=14.3"></script><script>
const $=s=>document.querySelector(s);function showStatus(message,ok=true){const el=$('#requestStatus');el.textContent=message;el.className=`status show ${ok?'ok':'err'}`;el.scrollIntoView({behavior:'smooth',block:'center'})}
async function uploadRequestPhoto(file){if(!file)throw new Error('اختر صورة للمتوفى.');if(file.size>5*1024*1024)throw new Error('حجم الصورة أكبر من 5 ميجابايت.');const allowed=['image/jpeg','image/png','image/webp'];if(!allowed.includes(file.type))throw new Error('صيغة الصورة غير مدعومة.');const ext={"image/jpeg":"jpg","image/png":"png","image/webp":"webp"}[file.type];const path=`requests/${new Date().toISOString().slice(0,10)}/${crypto.randomUUID()}.${ext}`;const client=await Zikra.getClient();const {error}=await client.storage.from('memorial-images').upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type});if(error)throw error;return client.storage.from('memorial-images').getPublicUrl(path).data.publicUrl}
$('#requestForm').addEventListener('submit',async e=>{e.preventDefault();if($('#website').value)return;const btn=$('#submitRequest');btn.disabled=true;btn.textContent='جاري إرسال الطلب...';try{const death=$('#deathDate').value,birth=$('#birthDate').value;if(birth&&death&&birth>death)throw new Error('تاريخ الميلاد يجب أن يسبق تاريخ الوفاة.');const photoUrl=await uploadRequestPhoto($('#photoFile').files[0]);const client=await Zikra.getClient();const payload={requester_name:$('#requesterName').value.trim(),requester_contact:$('#requesterContact').value.trim(),full_name:$('#fullName').value.trim(),birth_date:birth||null,death_date:death||null,photo_url:photoUrl,short_description:$('#shortDescription').value.trim()||null,biography:$('#biography').value.trim()||null,prayer_text:$('#prayerText').value.trim()||null,status:'pending'};const {error}=await client.from('memorial_requests').insert(payload);if(error)throw error;$('#requestForm').reset();showStatus('تم إرسال طلبك بنجاح. سيظهر في لوحة الإدارة للمراجعة قبل النشر.');btn.textContent='تم إرسال الطلب'}catch(err){console.error(err);showStatus(err.message||'تعذر إرسال الطلب. حاول مرة أخرى.',false);btn.disabled=false;btn.textContent='إرسال الطلب للمراجعة'}});
</script></body></html>
